name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 💡 CRITICAL: Gives the runner permission to push the branch and open the PR
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 1. Install dependencies at the ROOT (where your playwright.config.js is)
    - name: Install root dependencies
      run: npm install

    # 2. Install dependencies inside the frontend (where your Vite app is)
    - name: Install frontend dependencies
      run: npm ci --prefix frontend

    # 2.5 Lighthouse
    - name: Run Lighthouse Audits
      uses: treosh/lighthouse-ci-action@v12
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    # 3. Install Playwright browsers (now perfectly natively at the root)
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 4. Run Playwright tests smoothly from the root
    - name: Run Playwright tests
      run: npx playwright test --reporter=html

    # 5. Handle visual regression updates (Runs only if tests failed due to snapshot differences)
    - name: Handle visual regression updates
      if: failure() 
      uses: peter-evans/create-pull-request@v7
      with:
        add-paths: |
          **/*.png
        commit-message: 'test: update playwright visual snapshots for linux'
        title: '📷 Update Playwright Snapshots for CI'
        branch: update-playwright-snapshots
        body: 'Automated snapshot update generated by Playwright run in CI.'

    # 6. Upload HTML Test Report (Runs even if previous steps failed or succeeded, but not if cancelled)
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'main' || github.ref_name == 'master'
    
    # GLOBAL ENV BLOCK: Applies your IDs to ALL steps inside this job automatically
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}