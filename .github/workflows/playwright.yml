name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 1. Install dependencies at the ROOT (where your playwright.config.js is)
    - name: Install root dependencies
      run: npm install

    # 2. Install dependencies inside the frontend (where your Vite app is)
    - name: Install frontend dependencies
      run: npm ci --prefix frontend
      
    # 3. Install Playwright browsers (now perfectly natively at the root)
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 4. Run Playwright tests smoothly from the root
    - name: Run Playwright tests
      run: npx playwright test --reporter=html

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
